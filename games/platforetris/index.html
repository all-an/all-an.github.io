<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platformer Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="start-screen">
    <div id="start-title">platforetris</div>
    <div id="start-prompt">click or press any key to start</div>
  </div>
  <div id="game-container">
    <div id="fill-bar-container"><div id="fill-bar"></div></div>
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="piece-info">
      <span id="piece-degrees">0°</span>
    </div>
    <div id="tetromino-selector">
      <canvas class="tet-preview" data-index="0" title="L"></canvas>
      <canvas class="tet-preview" data-index="1" title="J"></canvas>
      <canvas class="tet-preview" data-index="2" title="I"></canvas>
      <canvas class="tet-preview" data-index="3" title="O"></canvas>
      <canvas class="tet-preview" data-index="4" title="T"></canvas>
      <canvas class="tet-preview" data-index="5" title="S"></canvas>
      <canvas class="tet-preview" data-index="6" title="Z"></canvas>
    </div>
  </div>

  <div id="color-modal">
    <div id="color-modal-box">
      <div id="color-modal-title">choose color</div>
      <div id="color-modal-grid"></div>
    </div>
  </div>
  <div id="bg-tooltip"></div>
  <div id="cell-tooltip">
    <div class="cell-number" id="tooltip-number"></div>
    <div class="cell-coords" id="tooltip-coords"></div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
