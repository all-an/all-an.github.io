<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platformer Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="fill-bar-container"><div id="fill-bar"></div></div>
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="piece-info">
      <span id="piece-degrees">0°</span>
    </div>
  </div>
  <div id="bg-tooltip"></div>
  <div id="cell-tooltip">
    <div class="cell-number" id="tooltip-number"></div>
    <div class="cell-coords" id="tooltip-coords"></div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
