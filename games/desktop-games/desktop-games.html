<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Games - Allan</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎮%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="../../main-style.css">
</head>
<body>

    <!-- Matrix rain canvas is appended here by main.js and sits behind .bwin -->

    <!-- Borland-style floating window, centered over the Matrix rain desktop -->
    <div class="bwin">

        <!-- Window title bar: cyan, Borland active-window style -->
        <div class="bwin-title">══ Desktop Games ══</div>

        <!-- Window body: navigation buttons -->
        <div class="bwin-body">
            <div class="bwin-btns">
                <!-- sessionStorage flag tells haphazard/index.html to start ambient music -->
                <a href="haphazard/index.html" onclick="sessionStorage.setItem('haphazardMusic','1')">
                    <button class="bwin-btn">Haphazard</button>
                </a>
                <a href="platforetris/index.html">
                    <button class="bwin-btn">Platforetris</button>
                </a>
                <a href="../games.html">
                    <button class="bwin-btn">← Back</button>
                </a>
            </div>
        </div>

    </div>

    <script src="../../main.js"></script>
</body>
</html>
