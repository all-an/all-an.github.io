tr:last-child td { border-bottom: none; }
tr:hover td { background: #16161a; }
tr.clickable { cursor: pointer; }
.idx { font-family: var(--font-mono); font-size: 16px; color: var(--color-text-tertiary); padding-top: 3px; }
.concept { font-weight: 500; font-size: 18px; }
.concept a { color: inherit; text-decoration: none; }
.concept a:hover { text-decoration: underline; }
.cat { display: inline-block; font-size: 14px; padding: 2px 8px; border-radius: 99px; margin-top: 4px; white-space: nowrap; }
.langs { display: flex; flex-wrap: wrap; gap: 5px; }
.lang { font-family: var(--font-mono); font-size: 15px; background: #1e1e23; border: 1px solid var(--color-border-tertiary); border-radius: 4px; padding: 2px 7px; color: var(--color-text-secondary); }
.origin { font-size: 16px; color: var(--color-text-tertiary); font-style: italic; line-height: 1.5; }
.no-results { text-align: center; padding: 3rem; color: var(--color-text-secondary); font-size: 20px; }

const catClass = {ctrl:"cat-ctrl",types:"cat-types",memory:"cat-memory",conc:"cat-conc",async:"cat-async",reactive:"cat-reactive",coll:"cat-coll",func:"cat-func",errors:"cat-errors",test:"cat-test",pat:"cat-pat",meta:"cat-meta",io:"cat-io",runtime:"cat-runtime",safety:"cat-safety",mod:"cat-mod"};
const STATE_KEY = 'programming-concepts-index-state';

function saveIndexState() {
  sessionStorage.setItem(STATE_KEY, JSON.stringify({
    search: document.getElementById('search').value,
    category: document.getElementById('catFilter').value,
    scrollY: window.scrollY,
    pendingRestore: true,
  }));
}

function consumeIndexState() {
  const raw = sessionStorage.getItem(STATE_KEY);
  if (!raw) return null;

  try {
    const state = JSON.parse(raw);
    if (!state.pendingRestore) return null;
    sessionStorage.removeItem(STATE_KEY);
    return state;
  } catch {
    sessionStorage.removeItem(STATE_KEY);
    return null;
  }
}

function openConcept(url) {
  saveIndexState();
  location.href = url;
}

function renderLangs(langs) {
  return langs.map(g => {
    const [name, ...ls] = g;
    const preview = ls.slice(0,3).join(' · ') + (ls.length > 3 ? '…' : '');
    return `<span class="lang" title="${ls.join(', ')}">${name}${preview ? ' <span style="opacity:0.55">'+preview+'</span>' : ''}</span>`;
  }).join('');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  let rows = DATA;
  if (cat) rows = rows.filter(d => d.cat === cat);
  if (q) rows = rows.filter(d => (d.c+d.t+d.langs.flat().join(' ')).toLowerCase().includes(q));
  document.getElementById('count').textContent = rows.length + ' concepts';
  document.getElementById('noResults').style.display = rows.length ? 'none' : 'block';
  document.getElementById('tbody').innerHTML = rows.map((d, i) => `
    <tr${d.url ? ` class="clickable" onclick="openConcept('${d.url}')"` : ''}>
      <td><span class="idx">${i + 1}</span></td>
      <td><div class="concept">${d.url ? `<a href="${d.url}" onclick="event.stopPropagation(); saveIndexState();">${d.c}</a>` : d.c}</div><span class="cat ${catClass[d.cat]}">${d.cl}</span></td>
      <td><span class="origin">${d.cl}</span></td>
      <td><div class="langs">${renderLangs(d.langs)}</div></td>
      <td><span class="origin">${d.t}</span></td>
    </tr>`).join('');
}

if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

const savedState = consumeIndexState();
if (savedState) {
  document.getElementById('search').value = savedState.search || '';
  document.getElementById('catFilter').value = savedState.category || '';
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('catFilter').addEventListener('change', render);
render();

if (savedState) {
  requestAnimationFrame(() => {
    window.scrollTo({ top: savedState.scrollY || 0, behavior: 'auto' });
  });
}
</script>
