<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillset — Allan Pereira Abrahão</title>
  <style>
    :root {
      --color-background-primary:   #111113;
      --color-background-secondary: #1a1a1e;
      --color-text-primary:         #e8e8ea;
      --color-text-secondary:       #9898a0;
      --color-text-tertiary:        #5e5e66;
      --color-border-tertiary:      #232328;
      --border-radius-md:           7px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-background-primary); color: var(--color-text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-align: justify; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* nav */
    .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
    .nav a { font-size: 18px; color: var(--color-text-secondary); text-decoration: none; }
    .nav a:hover { color: var(--color-text-primary); }

    /* header */
    .name { font-size: 38px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.4rem; text-align: left; }
    .tagline { font-size: 22px; color: var(--color-text-secondary); margin-bottom: 2.5rem; line-height: 1.5; }

    /* section */
    .section { margin-bottom: 2.25rem; }
    .section-label { font-size: 16px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-tertiary); margin-bottom: 0.75rem; }
    .section p { font-size: 20px; color: var(--color-text-secondary); line-height: 1.7; }

    /* links */
    .links { display: flex; gap: 12px; flex-wrap: wrap; }
    .link { font-size: 18px; color: var(--color-text-secondary); text-decoration: none; padding: 6px 12px; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); }
    .link:hover { color: var(--color-text-primary); border-color: #3a3a44; }

    /* divider */
    hr { border: none; border-top: 1px solid var(--color-border-tertiary); margin: 2.25rem 0; }

    /* small italic running total of items across the four programming lists */
    .section p.list-total { font-size: 14px; font-style: italic; color: #6b6b73; margin-top: 1.5rem; }
  </style>
</head>
<body>
<div class="wrap">

  <nav class="nav">
    <a href="../../index.html">← about</a>
  </nav>

  <h1 class="name">Skillset</h1>
  <p class="tagline">Interactive references and learning tools for programming.</p>

  <hr />

  <div class="section">
    <div class="section-label">Programming</div>
    <div class="links">
      <a class="link" href="concepts/index.html">Programming Concepts</a>
      <a class="link" href="clean-code/clean-code.html">Clean Code Principles</a>
      <a class="link" href="algorithms/algorithms.html">Algorithms</a>
      <a class="link" href="aws/aws.html">AWS</a>
    </div>
    <!-- Running total of all entries across the four programming lists, filled in by script. -->
    <p class="list-total" id="listTotal" style="display: none;"></p>
  </div>

  <hr />

  <div class="section">
    <div class="section-label">Mathematics</div>
    <div class="links">
      <a class="link" href="math/math.html">Mathematics</a>
    </div>
  </div>

</div>

<script>
  // Count items across the four programming lists by fetching each list's data
  // source and counting its per-entry marker, so the total stays correct as the
  // lists grow without hand-editing this number. Each source uses a distinct
  // object-literal marker that appears exactly once per entry.
  const LIST_SOURCES = [
    { url: 'concepts/index.html',            marker: /\{c:"/g },      // Programming Concepts
    { url: 'clean-code/clean-code.html',     marker: /\{code:"/g },   // Clean Code Principles
    { url: 'algorithms/algorithms-data.js',  marker: /\{n:"/g },      // Algorithms
    { url: 'aws/aws.js',                     marker: /\{n:"/g },      // AWS
  ];

  // Fetch one source and return how many entries its marker matches.
  async function countEntries(source) {
    const text = await (await fetch(source.url)).text();
    return (text.match(source.marker) || []).length;
  }

  // Sum the four counts and reveal the italic line. If any fetch fails (e.g. the
  // page is opened from file:// rather than a server), leave the line hidden.
  (async () => {
    try {
      const counts = await Promise.all(LIST_SOURCES.map(countEntries));
      const total = counts.reduce((sum, n) => sum + n, 0);
      const el = document.getElementById('listTotal');
      el.textContent = total + ' items across the four lists';
      el.style.display = 'block';
    } catch {
      // Counting is a nice-to-have; silently skip it if the data can't be read.
    }
  })();
</script>
</body>
</html>
