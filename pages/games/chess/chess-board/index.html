<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- top-right navigation: piece-name tooltip, then back / games links -->
    <nav class="nav">
        <span class="piece-tooltip" id="pieceTooltip"></span>
        <a href="../front-chess-page/front-chess-page.html">back</a>
        <a href="../../unfinished-games.html">unfinished games</a>
    </nav>

    <!-- Pieces Black has captured (White pieces), pinned to the upper-left -->
    <div class="captures captures-black" id="capturedByBlack"></div>

    <!-- Pieces White has captured (Black pieces), pinned to the lower-right -->
    <div class="captures captures-white" id="capturedByWhite"></div>

    <!-- Check / checkmate banner pinned to the right edge; shown by script.js -->
    <div class="check-indicator" id="checkIndicator"></div>

    <div class="game-container">
        <!-- Shows whose turn it is and game status (check / checkmate / draw) -->
        <div class="status-board">
            <span id="turn">White to move</span>
            <span id="status"></span>
        </div>

        <!-- The 8x8 grid is generated by script.js into this element -->
        <div id="board" class="board"></div>

        <!-- Promotion picker, hidden until a pawn reaches the last rank -->
        <div class="promotion" id="promotion">
            <p>Promote pawn to:</p>
            <div class="promotion-choices" id="promotionChoices"></div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
