<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Alsotze</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔵%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Shown from JS if screen is wider than a typical phone -->
  <div id="desktop-warning">
    <div class="desktop-frame">
      <h2>Best on Mobile</h2>
      <p>This game is designed for small touch screens. It may feel cramped or awkward on a wide display.</p>
      <button id="warning-dismiss">Play anyway</button>
      <a href="../../games.html">← Back to games</a>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <!-- HUD: always on top of canvas -->
  <div id="hud">
    <span id="lives"></span>
    <span id="score">0</span>
  </div>

  <!-- Start screen overlay -->
  <div id="start-screen">
    <div id="start-title">ALSOTZE</div>
    <div id="start-sub">tap orbs before they vanish</div>
    <div id="start-prompt">tap to start</div>
  </div>

  <!-- Game-over screen overlay -->
  <div id="gameover-screen">
    <div id="gameover-title">GAME OVER</div>
    <div id="final-score"></div>
    <div id="gameover-prompt">tap to retry</div>
  </div>

  <script src="game.js"></script>
</body>
</html>
