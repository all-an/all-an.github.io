<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haphazard</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💀%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mobile-warning">
        <div class="phone-frame">
            <h2>Best on Desktop</h2>
            <p>This game requires a keyboard and mouse — it's not playable on a small screen.</p>
            <a href="archive/games/desktop-games/desktop-games.html">← Back to games</a>
        </div>
    </div>

    <div id="blocker">
        <div id="instructions">
            <h1>HAPHAZARD</h1>
            <p>Click to play</p>
            <p>WASD — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Click — Activate button (also distant)</p>
        </div>
    </div>
    <div id="crosshair">+</div>
    <div id="hud">
        <span id="health"></span>
    </div>
    <div id="vertex-tooltip"></div>
    <div id="hit-marker"></div>
    <div id="death-msg"><span>YOU DIED</span></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
